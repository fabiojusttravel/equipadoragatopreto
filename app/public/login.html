<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Gato Preto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#c8102e;--bg:#f5f4f0;--white:#fff;--border:#e8e6e1;--text:#1a1814;--muted:#8a8680}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--white);border:1px solid var(--border);padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 4px 32px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:2rem}
.logo-mark{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--text)}
.logo-mark span{color:var(--accent)}
.logo-sub{font-size:.62rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}
h2{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem;text-align:center}
.field{margin-bottom:1rem}
label{display:block;font-size:.68rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
input{width:100%;border:1.5px solid var(--border);border-radius:4px;padding:.65rem .8rem;font-family:'Inter',sans-serif;font-size:.875rem;color:var(--text);outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
.btn{width:100%;background:var(--text);color:#fff;border:none;padding:.75rem;border-radius:4px;font-family:'Inter',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:.5rem}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{background:rgba(200,16,46,.08);border:1px solid rgba(200,16,46,.2);color:var(--accent);padding:.6rem .8rem;border-radius:4px;font-size:.78rem;margin-top:.75rem;display:none}
.back{display:block;text-align:center;margin-top:1.25rem;font-size:.75rem;color:var(--muted);text-decoration:none}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">Gato <span>Preto</span></div>
    <div class="logo-sub">Catálogo de Autopeças</div>
  </div>
  <h2>Acesso administrativo</h2>
  <form id="loginForm">
    <div class="field">
      <label for="username">Usuário</label>
      <input type="text" id="username" autocomplete="username" placeholder="admin" required>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit" id="btn">Entrar</button>
    <div class="error" id="err"></div>
  </form>
  <a class="back" href="/">← Voltar ao catálogo</a>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando…';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');

    localStorage.setItem('gp_token', data.token);
    localStorage.setItem('gp_user', JSON.stringify(data.user));
    window.location.href = data.user.role === 'admin' ? '/admin' : '/';
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
