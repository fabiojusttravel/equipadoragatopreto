<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Conferente — Gato Preto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#c8102e;--accent-dark:#a50d24;
  --bg:#f5f4f0;--white:#fff;--surface:#fafaf8;
  --border:#e8e6e1;--border2:#d4d1cb;
  --text:#1a1814;--text2:#3d3a35;--muted:#8a8680;--muted2:#b5b2ac;
  --green:#1a7a3e;--red:#c8102e;--amber:#b5620a;
  --green-bg:rgba(26,122,62,.09);--amber-bg:rgba(181,98,10,.09);--red-bg:rgba(200,16,46,.09);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  background:var(--bg);font-family:'Inter',sans-serif;
  min-height:100%;min-height:100dvh;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:none;
}

/* ── HEADER ─────────────────────────────────── */
.app-header{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:.75rem 1rem;padding-top:calc(.75rem + var(--safe-top));
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.logo-mark{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;color:var(--text);line-height:1}
.logo-mark span{color:var(--accent)}
.logo-sub{font-size:.52rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:.1rem}
.btn-logout{
  padding:.45rem .9rem;border-radius:6px;border:1.5px solid var(--border2);
  background:transparent;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;
  cursor:pointer;color:var(--text2);touch-action:manipulation;
  transition:background .15s,color .15s;
}
.btn-logout:active{background:var(--text);color:#fff;border-color:var(--text)}

/* ── SEARCH BAR ──────────────────────────────── */
.search-bar{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:.65rem 1rem;position:sticky;top:calc(56px + var(--safe-top));z-index:190;
  display:flex;gap:.5rem;align-items:center;
}
.search-input-wrap{position:relative;flex:1}
.search-input-wrap svg{
  position:absolute;left:.75rem;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--muted);pointer-events:none;flex-shrink:0;
}
.search-input{
  width:100%;border:1.5px solid var(--border2);border-radius:8px;
  padding:.6rem .75rem .6rem 2.25rem;font-family:'Inter',sans-serif;
  font-size:.88rem;color:var(--text);outline:none;
  transition:border-color .2s;background:var(--bg);
  -webkit-appearance:none;height:42px;
}
.search-input:focus{border-color:var(--accent);background:var(--white)}
.search-input::placeholder{color:var(--muted2)}
.filter-btn{
  height:42px;padding:0 .75rem;border-radius:8px;border:1.5px solid var(--border2);
  background:transparent;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;
  cursor:pointer;color:var(--text2);white-space:nowrap;touch-action:manipulation;
  display:flex;align-items:center;gap:.35rem;transition:all .15s;flex-shrink:0;
}
.filter-btn.active{background:rgba(200,16,46,.08);border-color:rgba(200,16,46,.3);color:var(--accent)}
.filter-btn:active{opacity:.7}

/* ── STATUS CHIPS ───────────────────────────── */
.status-tabs{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:.5rem 1rem;display:flex;gap:.4rem;overflow-x:auto;
  position:sticky;top:calc(112px + var(--safe-top));z-index:180;
  scrollbar-width:none;
}
.status-tabs::-webkit-scrollbar{display:none}
.chip{
  padding:.3rem .75rem;border-radius:20px;border:1.5px solid var(--border2);
  background:transparent;font-family:'Inter',sans-serif;font-size:.7rem;font-weight:600;
  cursor:pointer;color:var(--text2);white-space:nowrap;touch-action:manipulation;
  transition:all .15s;flex-shrink:0;
}
.chip.active{background:var(--text);border-color:var(--text);color:#fff}
.chip:active{opacity:.7}

/* ── PRODUCT LIST ────────────────────────────── */
.product-list{padding:.75rem 1rem 6rem;display:flex;flex-direction:column;gap:.5rem}

.product-card{
  background:var(--white);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;touch-action:manipulation;cursor:pointer;
  transition:box-shadow .15s,transform .1s;
  active-scale:.98;
}
.product-card:active{transform:scale(.985);box-shadow:0 2px 12px rgba(0,0,0,.08)}

.card-top{padding:.85rem 1rem .65rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.card-ref{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.card-name{font-size:.88rem;font-weight:600;color:var(--text);line-height:1.3;flex:1}

.card-stocks{
  padding:.5rem 1rem .8rem;border-top:1px solid var(--border);
  display:flex;gap:0;
}
.stock-item{flex:1;text-align:center}
.stock-item + .stock-item{border-left:1px solid var(--border)}
.stock-label{font-size:.55rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.stock-value{font-size:1rem;font-weight:700;color:var(--text)}
.stock-value.real{color:var(--accent)}
.stock-value.empty{color:var(--muted2);font-weight:400;font-size:.8rem}

.card-footer{padding:.55rem 1rem .65rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-edit-hint{font-size:.7rem;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:.3rem}
.card-edit-hint svg{width:14px;height:14px}

/* Badges */
.badge{font-size:.55rem;font-weight:700;padding:.2rem .5rem;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
.badge-eq{background:var(--green-bg);color:var(--green)}
.badge-diff{background:var(--red-bg);color:var(--red)}
.badge-fi{background:var(--amber-bg);color:var(--amber)}
.badge-alert{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(181,98,10,.25)}

/* ── EMPTY / LOADING ─────────────────────────── */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.empty-state p{font-size:.85rem;line-height:1.6}
.skeleton-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.skel-line{background:linear-gradient(90deg,var(--border) 25%,var(--surface) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;height:12px;margin:.5rem}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── BOTTOM SHEET ────────────────────────────── */
.sheet-overlay{
  display:none;position:fixed;inset:0;background:rgba(20,18,14,.55);
  z-index:900;backdrop-filter:blur(3px);
}
.sheet-overlay.open{display:block}
.bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:950;
  background:var(--white);border-radius:20px 20px 0 0;
  max-height:92dvh;overflow-y:auto;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.32,1);
  padding-bottom:calc(1.5rem + var(--safe-bottom));
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
}
.bottom-sheet.open{transform:translateY(0)}

.sheet-handle{
  width:36px;height:4px;background:var(--border2);border-radius:2px;
  margin:.75rem auto .5rem;
}
.sheet-header{
  padding:.5rem 1.25rem 1rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.75rem;
}
.btn-sheet-close{
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;flex-shrink:0;
}
.btn-sheet-close svg{width:16px;height:16px;color:var(--text2)}
.sheet-title{flex:1}
.sheet-title h3{font-size:.92rem;font-weight:700;color:var(--text)}
.sheet-title p{font-size:.68rem;color:var(--muted);margin-top:.1rem;font-family:'Inter',monospace}

.sheet-body{padding:1.25rem}

/* Info grid inside sheet */
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:1.25rem}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;text-align:center}
.info-box-label{font-size:.52rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem}
.info-box-value{font-size:1.15rem;font-weight:800;color:var(--text)}
.info-box-value.accent{color:var(--accent)}
.info-box-value.muted{color:var(--muted2);font-weight:400;font-size:.85rem}

/* Field */
.field{margin-bottom:1rem}
.field label{display:block;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.field-input{
  width:100%;border:2px solid var(--border2);border-radius:10px;
  padding:.85rem 1rem;font-family:'Inter',sans-serif;font-size:1.2rem;font-weight:700;
  color:var(--text);outline:none;transition:border-color .2s;background:var(--white);
  -webkit-appearance:none;text-align:center;
}
.field-input:focus{border-color:var(--accent)}
.field-input.invalid{border-color:var(--red)}
.field-input:disabled,.field-input[readonly]{background:var(--surface);color:var(--muted);font-weight:500;font-size:1rem;cursor:not-allowed;border-style:dashed}

/* Stock rule hint */
.rule-hint{
  border-radius:10px;padding:.75rem 1rem;font-size:.8rem;font-weight:600;
  display:none;margin-bottom:1rem;line-height:1.5;
}
.rule-hint.show{display:block}
.rule-hint.warn{background:var(--amber-bg);border:1.5px solid rgba(181,98,10,.3);color:var(--amber)}
.rule-hint.ok{background:var(--green-bg);border:1.5px solid rgba(26,122,62,.25);color:var(--green)}
.rule-hint.err{background:var(--red-bg);border:1.5px solid rgba(200,16,46,.25);color:var(--red)}

/* Fiscal alert banner */
.fiscal-alert-banner{
  background:var(--amber-bg);border:1.5px solid rgba(181,98,10,.3);
  border-radius:10px;padding:.75rem 1rem;font-size:.78rem;color:var(--amber);
  font-weight:600;margin-bottom:1rem;display:none;
}
.fiscal-alert-banner.show{display:flex;gap:.5rem;align-items:flex-start}

/* Save button */
.btn-save{
  width:100%;background:var(--accent);color:#fff;border:none;
  border-radius:12px;padding:1rem;font-family:'Inter',sans-serif;
  font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;
  transition:background .15s,opacity .15s;margin-top:.25rem;
  min-height:54px;
}
.btn-save:active{background:var(--accent-dark);opacity:.9}
.btn-save:disabled{opacity:.45;cursor:not-allowed}

/* ── FLOATING COUNTER ────────────────────────── */
.fab-count{
  position:fixed;bottom:calc(1.5rem + var(--safe-bottom));right:1rem;
  background:var(--text);color:#fff;border-radius:20px;padding:.5rem .85rem;
  font-size:.75rem;font-weight:700;z-index:100;display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
.fab-count.show{display:block}

/* ── TOAST ───────────────────────────────────── */
.toast{
  position:fixed;bottom:calc(2rem + var(--safe-bottom));left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;padding:.65rem 1.5rem;
  border-radius:8px;font-size:.8rem;font-weight:600;
  opacity:0;transition:all .25s;z-index:9999;pointer-events:none;
  white-space:nowrap;max-width:calc(100vw - 2rem);text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:#1a7a3e}
.toast.error{background:var(--accent)}

/* ── PAGINATION ──────────────────────────────── */
.pagination{display:flex;gap:.5rem;justify-content:center;padding:1rem 0 .5rem;flex-wrap:wrap}
.pg-btn{
  padding:.5rem 1rem;border-radius:8px;border:1.5px solid var(--border2);
  background:transparent;font-family:'Inter',sans-serif;font-size:.75rem;font-weight:600;
  cursor:pointer;color:var(--text2);touch-action:manipulation;
}
.pg-btn:active{opacity:.7}
.pg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}
.pg-info{font-size:.72rem;color:var(--muted);text-align:center;padding:.25rem 0}

/* ── LOGIN SCREEN ────────────────────────────── */
#screen-login{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;
  padding:1.5rem;background:var(--bg);
}
.login-card{
  background:var(--white);border:1px solid var(--border);border-radius:16px;
  padding:2.5rem 2rem;width:100%;max-width:380px;
  box-shadow:0 8px 40px rgba(0,0,0,.09);
}
.login-logo{text-align:center;margin-bottom:1.75rem}
.login-logo .logo-mark{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;color:var(--text)}
.login-logo .logo-mark span{color:var(--accent)}
.login-logo .logo-sub{font-size:.6rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}
.login-role{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem;text-align:center}
.login-field{margin-bottom:.9rem}
.login-field label{display:block;font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.login-field input{
  width:100%;border:1.5px solid var(--border2);border-radius:8px;
  padding:.75rem .9rem;font-family:'Inter',sans-serif;font-size:.95rem;
  color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none;
}
.login-field input:focus{border-color:var(--accent)}
.btn-login{
  width:100%;background:var(--text);color:#fff;border:none;
  border-radius:8px;padding:.85rem;font-family:'Inter',sans-serif;
  font-size:.9rem;font-weight:700;cursor:pointer;margin-top:.5rem;
  min-height:50px;touch-action:manipulation;
}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-error{
  background:var(--red-bg);border:1px solid rgba(200,16,46,.2);color:var(--accent);
  padding:.65rem .9rem;border-radius:8px;font-size:.78rem;margin-top:.75rem;display:none;
}

/* ── SCREENS ─────────────────────────────────── */
#screen-app{display:none}

/* ── RESPONSIVE DESKTOP ──────────────────────── */
@media(min-width:640px){
  .product-list{max-width:680px;margin:0 auto}
  .bottom-sheet{max-width:520px;left:50%;transform:translate(-50%,100%);right:auto;border-radius:16px 16px 0 0}
  .bottom-sheet.open{transform:translate(-50%,0)}
  .search-bar,.status-tabs{max-width:100%}
}
</style>
</head>
<body>

<!-- ╔══ LOGIN SCREEN ══════════════════════════════════╗ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">Gato <span>Preto</span></div>
      <div class="logo-sub">Autopeças</div>
    </div>
    <div class="login-role">Conferente de Estoque</div>
    <form id="loginForm">
      <div class="login-field">
        <label for="lu">Usuário</label>
        <input type="text" id="lu" autocomplete="username" placeholder="usuário" required autocapitalize="none">
      </div>
      <div class="login-field">
        <label for="lp">Senha</label>
        <input type="password" id="lp" autocomplete="current-password" placeholder="senha" required>
      </div>
      <button class="btn-login" type="submit" id="lbtn">Entrar</button>
      <div class="login-error" id="lerr"></div>
    </form>
  </div>
</div>

<!-- ╔══ APP SCREEN ═════════════════════════════════════╗ -->
<div id="screen-app">

  <!-- Header -->
  <header class="app-header">
    <div>
      <div class="logo-mark">Gato <span>Preto</span></div>
      <div class="logo-sub">Conferente</div>
    </div>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </header>

  <!-- Search -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="search" type="search" placeholder="Buscar por nome ou código…"
             autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search">
    </div>
    <button class="filter-btn" id="alert-filter-btn" onclick="toggleAlertFilter()" title="Apenas alertas fiscais">
      ⚠️
    </button>
  </div>

  <!-- Status chips -->
  <div class="status-tabs">
    <button class="chip active" data-status="T" onclick="setStatus('T',this)">Todos</button>
    <button class="chip" data-status="0" onclick="setStatus('0',this)">Iguais</button>
    <button class="chip" data-status="1" onclick="setStatus('1',this)">Divergentes</button>
    <button class="chip" data-status="2" onclick="setStatus('2',this)">Só Fiscal</button>
  </div>

  <!-- Product list -->
  <div class="product-list" id="product-list"></div>

  <!-- Pagination info -->
  <div class="pg-info" id="pg-info"></div>
  <div class="pagination" id="pagination"></div>

</div>

<!-- ╔══ BOTTOM SHEET ═══════════════════════════════════╗ -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <button class="btn-sheet-close" onclick="closeSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 5 5 12 12 19"/>
      </svg>
    </button>
    <div class="sheet-title">
      <h3 id="sheet-name">—</h3>
      <p id="sheet-ref">—</p>
    </div>
  </div>
  <div class="sheet-body">

    <!-- Fiscal alert banner -->
    <div class="fiscal-alert-banner" id="fiscal-banner">
      <span>⚠️</span>
      <span>Este produto está marcado para desativação no fiscal (estoque real zerado).</span>
    </div>

    <!-- Current stock info -->
    <div class="info-grid">
      <div class="info-box">
        <div class="info-box-label">Fiscal</div>
        <div class="info-box-value" id="sh-fiscal">—</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Gerencial</div>
        <div class="info-box-value" id="sh-mgmt">—</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Real atual</div>
        <div class="info-box-value accent" id="sh-real">—</div>
      </div>
    </div>

    <!-- Real stock input -->
    <div class="field">
      <label for="inp-real">Contagem de Estoque Real</label>
      <input class="field-input" id="inp-real" type="number" inputmode="decimal"
             min="0" step="1" placeholder="0" autocomplete="off">
    </div>

    <!-- Stock rule hint -->
    <div class="rule-hint" id="rule-hint"></div>

    <!-- Save button -->
    <button class="btn-save" id="btn-save" onclick="saveProduct()">Salvar</button>
    <div class="err-msg" id="sheet-err" style="color:var(--red);font-size:.78rem;margin-top:.65rem;text-align:center;display:none"></div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';

/* ═══ STATE ══════════════════════════════════════════════════════════ */
let token    = null;
let products = [];
let page     = 1;
let total    = 0;
const limit  = 20;
let statusFilter  = 'T';
let alertFilter   = false;
let searchQuery   = '';
let currentProduct = null;
let searchTimer   = null;

/* ═══ AUTH ══════════════════════════════════════════════════════════ */
function init() {
  token = localStorage.getItem('gp_token');
  if (token) {
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-app').style.display   = 'none';
}

function showApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display   = 'block';
  loadProducts(1);
}

function logout() {
  localStorage.removeItem('gp_token');
  localStorage.removeItem('gp_user');
  token = null;
  showLogin();
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('lbtn');
  const err = document.getElementById('lerr');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando…';
  try {
    const res  = await fetch('/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('lu').value,
        password: document.getElementById('lp').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');
    token = data.token;
    localStorage.setItem('gp_token', token);
    localStorage.setItem('gp_user', JSON.stringify(data.user));
    showApp();
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});

/* ═══ FILTERS ════════════════════════════════════════════════════════ */
document.getElementById('search').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchQuery = e.target.value.trim();
  searchTimer = setTimeout(() => loadProducts(1), 350);
});

function setStatus(s, el) {
  statusFilter = s;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  loadProducts(1);
}

function toggleAlertFilter() {
  alertFilter = !alertFilter;
  const btn = document.getElementById('alert-filter-btn');
  btn.classList.toggle('active', alertFilter);
  loadProducts(1);
}

/* ═══ PRODUCT LIST ═══════════════════════════════════════════════════ */
async function loadProducts(p = 1) {
  page = p;
  const list = document.getElementById('product-list');
  list.innerHTML = skeletons(4);

  const params = new URLSearchParams({
    page: p, limit,
    sort: 'name', order: 'asc'
  });
  if (searchQuery)  params.set('q', searchQuery);
  if (statusFilter !== 'T') params.set('status', statusFilter);
  if (alertFilter)  params.set('fiscal_alert', '1');

  try {
    const res  = await fetch('/api/products?' + params, {
      headers: token ? { Authorization: 'Bearer ' + token } : {}
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    products = data.products || [];
    total    = data.total    || 0;
    renderList();
    renderPagination();
  } catch {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Erro ao carregar produtos.<br>Verifique sua conexão.</p></div>';
  }
}

function renderList() {
  const list = document.getElementById('product-list');
  if (!products.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>Nenhum produto encontrado.</p></div>';
    return;
  }
  list.innerHTML = products.map(p => {
    const badge    = statusBadge(p.status);
    const alertTag = p.fiscal_alert ? `<span class="badge badge-alert">⚠️ Alerta</span>` : '';
    const realVal  = p.stock_real !== null && p.stock_real !== undefined
      ? `<span class="stock-value real">${fmt(p.stock_real)}</span>`
      : `<span class="stock-value empty">—</span>`;

    return `
    <div class="product-card" onclick="openSheet('${esc(p.id)}')">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="card-ref">${esc(p.id)}</div>
          <div class="card-name">${esc(p.name)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.3rem">
          ${badge}
          ${alertTag}
        </div>
      </div>
      <div class="card-stocks">
        <div class="stock-item">
          <div class="stock-label">Est. Fiscal</div>
          <div class="stock-value">${fmt(p.stock_fiscal)}</div>
        </div>
        <div class="stock-item">
          <div class="stock-label">Est. Gerencial</div>
          <div class="stock-value">${fmt(p.stock_mgmt)}</div>
        </div>
        <div class="stock-item">
          <div class="stock-label">Real</div>
          ${realVal}
        </div>
      </div>
      <div class="card-footer">
        <span class="card-edit-hint">
          Editar produto
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </span>
      </div>
    </div>`;
  }).join('');
}

function renderPagination() {
  const pages = Math.ceil(total / limit);
  const info  = document.getElementById('pg-info');
  const pag   = document.getElementById('pagination');

  const from = (page - 1) * limit + 1;
  const to   = Math.min(page * limit, total);
  info.textContent = total ? `Exibindo ${from}–${to} de ${total} produtos` : '';

  if (pages <= 1) { pag.innerHTML = ''; return; }

  let html = `<button class="pg-btn" onclick="loadProducts(${page-1})" ${page===1?'disabled':''}>← Ant.</button>`;

  // Show limited page buttons
  const start = Math.max(1, page - 2);
  const end   = Math.min(pages, page + 2);
  for (let i = start; i <= end; i++) {
    html += `<button class="pg-btn ${i===page?'active':''}" onclick="loadProducts(${i})">${i}</button>`;
  }
  html += `<button class="pg-btn" onclick="loadProducts(${page+1})" ${page===pages?'disabled':''}>Próx. →</button>`;
  pag.innerHTML = html;
}

/* ═══ BOTTOM SHEET ═══════════════════════════════════════════════════ */
async function openSheet(id) {
  // Find in current list or fetch
  let p = products.find(x => x.id === id);
  if (!p) {
    try {
      const res = await fetch(`/api/products/${encodeURIComponent(id)}`,{
        headers:{ Authorization:'Bearer '+token }
      });
      p = await res.json();
    } catch { return; }
  }
  currentProduct = p;

  document.getElementById('sheet-name').textContent = p.name;
  document.getElementById('sheet-ref').textContent  = p.id;
  document.getElementById('sh-fiscal').textContent  = fmt(p.stock_fiscal);
  document.getElementById('sh-mgmt').textContent    = fmt(p.stock_mgmt);

  const realEl = document.getElementById('sh-real');
  if (p.stock_real !== null && p.stock_real !== undefined) {
    realEl.textContent = fmt(p.stock_real);
    realEl.className   = 'info-box-value accent';
  } else {
    realEl.textContent = '—';
    realEl.className   = 'info-box-value muted';
  }

  const banner = document.getElementById('fiscal-banner');
  banner.classList.toggle('show', !!p.fiscal_alert);

  const inp = document.getElementById('inp-real');
  inp.value = p.stock_real !== null && p.stock_real !== undefined ? p.stock_real : '';
  inp.classList.remove('invalid');

  document.getElementById('rule-hint').className = 'rule-hint';
  document.getElementById('sheet-err').style.display = 'none';
  document.getElementById('btn-save').disabled = false;

  updateRuleHint(inp.value);

  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');

  // Focus input after animation
  setTimeout(() => inp.focus(), 350);
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
  currentProduct = null;
  // Blur to dismiss keyboard
  document.activeElement?.blur();
}

/* ═══ STOCK RULE ═════════════════════════════════════════════════════ */
document.getElementById('inp-real').addEventListener('input', (e) => {
  updateRuleHint(e.target.value);
});

function updateRuleHint(val) {
  const hint  = document.getElementById('rule-hint');
  const inp   = document.getElementById('inp-real');
  const v     = val.trim();

  inp.classList.remove('invalid');
  hint.className = 'rule-hint';

  if (v === '' || v === null) return;

  const num = parseFloat(v.replace(',', '.'));

  if (isNaN(num)) return;

  if (num < 0) {
    inp.classList.add('invalid');
    hint.className   = 'rule-hint err show';
    hint.textContent = '❌ O valor Real não pode ser negativo.';
    return;
  }

  if (num === 0) {
    hint.className   = 'rule-hint warn show';
    hint.innerHTML   = '⚠️ <strong>Real = 0</strong> — Estoque Gerencial será zerado e o produto será marcado para desativação no fiscal.';
  } else {
    hint.className   = 'rule-hint ok show';
    hint.innerHTML   = `✅ <strong>Estoque Gerencial</strong> será atualizado para <strong>${fmt(num)}</strong> automaticamente.`;
  }
}

/* ═══ SAVE ═══════════════════════════════════════════════════════════ */
async function saveProduct() {
  if (!currentProduct) return;

  const inp    = document.getElementById('inp-real');
  const errEl  = document.getElementById('sheet-err');
  const btn    = document.getElementById('btn-save');
  const rawVal = inp.value.trim().replace(',', '.');

  errEl.style.display = 'none';

  // Validate
  if (rawVal !== '') {
    const num = parseFloat(rawVal);
    if (isNaN(num) || num < 0) {
      errEl.textContent  = 'Valor inválido. Informe um número maior ou igual a zero.';
      errEl.style.display = 'block';
      inp.classList.add('invalid');
      return;
    }
  }

  btn.disabled    = true;
  btn.textContent = 'Salvando…';

  try {
    const body = {
      name:       currentProduct.name,
      price_mgmt: currentProduct.price_mgmt,
      status:     currentProduct.status
    };
    if (rawVal !== '') body.stock_real = parseFloat(rawVal);

    const res = await fetch(`/api/products/${encodeURIComponent(currentProduct.id)}`, {
      method:  'PUT',
      headers: {
        'Content-Type':  'application/json',
        Authorization: 'Bearer ' + token
      },
      body: JSON.stringify(body)
    });

    if (res.status === 401) { logout(); return; }

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao salvar');

    showToast('✅ Produto atualizado!', 'success');
    closeSheet();
    loadProducts(page);
  } catch (ex) {
    errEl.textContent  = ex.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Salvar';
  }
}

/* ═══ HELPERS ════════════════════════════════════════════════════════ */
function fmt(v) {
  if (v === null || v === undefined) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  return n % 1 === 0 ? n.toFixed(0) : n.toFixed(2).replace('.', ',');
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function statusBadge(s) {
  const map = {
    0: ['badge-eq',   'Igual'],
    1: ['badge-diff', 'Divergente'],
    2: ['badge-fi',   'Só Fiscal'],
  };
  const [cls, label] = map[s] || ['badge-fi','—'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function skeletons(n) {
  return Array.from({length:n}, () => `
    <div class="skeleton-card" style="padding:.85rem 1rem">
      <div class="skel-line" style="width:30%;height:9px;margin-bottom:.5rem"></div>
      <div class="skel-line" style="width:75%;height:14px"></div>
      <div style="display:flex;gap:.5rem;margin-top:.65rem">
        <div class="skel-line" style="flex:1;height:10px"></div>
        <div class="skel-line" style="flex:1;height:10px"></div>
        <div class="skel-line" style="flex:1;height:10px"></div>
      </div>
    </div>`).join('');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent  = msg;
  t.className    = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast ' + type; }, 2800);
}

/* ═══ KEYBOARD ═══════════════════════════════════════════════════════ */
// Close sheet on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeSheet();
});

// Save on Enter inside real stock input
document.getElementById('inp-real').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); saveProduct(); }
});

/* ═══ BOOT ═══════════════════════════════════════════════════════════ */
init();
</script>
